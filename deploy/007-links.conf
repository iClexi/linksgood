<VirtualHost *:80>
    ServerName links.iclexi.tech

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "links.iclexi.tech"

    ProxyPass / http://127.0.0.1:9827/ timeout=60 retry=0
    ProxyPassReverse / http://127.0.0.1:9827/

    ErrorLog ${APACHE_LOG_DIR}/links-error.log
    CustomLog ${APACHE_LOG_DIR}/links-access.log combined
</VirtualHost>
